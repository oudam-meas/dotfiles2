# Vanilla Tmux Configuration

# Prefix is Ctrl-b
set -g prefix C-b

# --- Navigation ---
# Standard HJKL for pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Splitting ---
# More intuitive split keys (| and -)
# Opens new panes in the same directory (current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Resizing ---
# Use Shift + HJKL to resize panes in increments of 5
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Quality of Life ---
set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1

# Status bar (Minimal)
set -g status-style bg=default
set -g status-left "#[fg=green]Session: #S "
set -g status-right "#[fg=cyan]%R"
