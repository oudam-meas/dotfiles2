# Vanilla Tmux Configuration

# Prefix is Ctrl-b
set -g prefix C-b

# --- Navigation ---
# Standard HJKL for pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Splitting ---
# More intuitive split keys (| and -)
# Opens new panes in the same directory (current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Resizing ---
# Use Shift + HJKL to resize panes in increments of 5
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Quality of Life ---
set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1

# Quick reload of tmux config
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# --- Vim Copy Mode ---
# Use vim keybindings in copy mode
setw -g mode-keys vi

# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Setup 'y' to yank (copy) as in Vim
# This also copies to the macOS system clipboard
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Update default binding of 'Enter' to also use copy-pipe
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Status bar (Minimal)
set -g status-style bg=default
set -g status-left "#[fg=green]Session: #S "
set -g status-right "#[fg=cyan]%R"
